<template name="underlyings">


  <table class="table">
    <button class="btn btn-outline-theme pull-right mb-2" id='next_ticker'><i class="fas fa-plus"></i> Add ticker</button>
    <tbody class="underlyings_input">
      <tr id="underlying_line_1" class="">
        <th scope="row"><label for="underlying_1" class="mb-2">Ticker</label>
          <div class="input-group">
            <input type="text" class="form-control underlyings underlyings_change required" id="underlying_1" placeholder="Ticker" aria-label="Ticker" aria-describedby="basic-addon2" style="text-transform:uppercase"  autocomplete="off">
            <div class="input-group-append">
              <select class="form-select underlyings_change" id="country_1" aria-label="Default select example">
                <option selected>US</option>
                <option value="1">FR</option>
                <option value="2">DE</option>
              </select>
            </div>
          </div>
        </th>
        <td><label for="close_1" class="mb-2">Close ()</label><input type="text" class="form-control cash" id="close_1" value="" disabled></td>
        <td><label for="strike_1" class="mb-2">Strike</label><input type="text" class="form-control required cash" id="strike_1" value=""  autocomplete="off"></td>


        <td></td>
      </tr>

    </tbody>
  </table>

</template>
