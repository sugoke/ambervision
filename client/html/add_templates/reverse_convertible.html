<template name="features_reverse_convertible">


  <div class="row mb-3">
    <div class="col-3">
      <div class="form-group mb-3">
        <label for="coupon" class="form-label">Guaranteed Coupon</label>
        <input type="text" class="form-control add_field required" id="coupon" value="5.00%">
      </div>
    </div>




    <div class="col-4">

      <label class="form-label">Protection barrier</label>
      <div class="input-group mb-3">
        <input type="text" class="form-control percent  add_field" aria-label="Duration" aria-describedby="basic-addon2" id="protection_barrier" autocomplete="off">
        <div class="input-group-append">

          <select class="form-select add_field required" id="barrier_type" aria-label="Default select example">

            <option selected value="European">European</option>
            <option value="American">American</option>

          </select>


        </div>
      </div>
    </div>


  </div>

  <div class="row mb-3">
    <div class="col">



      <div class="form-check form-switch">
        <input type="checkbox" class="form-check-input  add_checkbox" id="geared_put" name="Geared Put">
        <label class="form-check-label" for="geared_put">Geared Put</label>
      </div>
      <div class="form-check form-switch">
        <input type="checkbox" class="form-check-input add_checkbox" id="one_star" name="One Star">
        <label class="form-check-label" for="one_star">One Star</label>
      </div>

      <div class="form-check form-switch">
        <input type="checkbox" class="form-check-input add_checkbox" id="best_strike" name="Best strike">
        <label class="form-check-label" for="best_strike">Best strike</label>
      </div>


    </div>

    <div class="col">
    </div>
    <div class="col">
    </div>
    <div class="col">
    </div>
  </div>

  <div class="row mb-3">

  </div>


</template>
<!-- /////////////////////////////////////////////////////////////////////////////////////  -->


<template name="dates_reverse_convertible">

  <div class="row mb-3">
    <div class="col-3">
      <div class="form-group mb-3">
        <label for="reoffer" class="form-label">Launch date</label>
        <input type="text" class="form-control datepick add_field required" id="launch_date" placeholder="dd/mm/yyyy" autocomplete="off" />
      </div>
    </div>

    <div class="col-2">
      <label for="reoffer" class="form-label">Payment lag</label>
      <div class="input-group flex-nowrap mb-3">
        <span class="input-group-text" id="addon-wrapping">t+</span>
        <input type="number" class="form-control  add_field required" value="7" placeholder="" id="pmt_lag" autocomplete="off" />
      </div>
    </div>



  </div>

  <div class="row mb-3">

    <div class="col">
    <button class="btn btn-outline-theme mb-2" id='generate_schedule_reverse_convertible' disabled><i class="fas fa-calendar-check"></i>  Generate schedule</button>
  </div>
  </div>

  <hr />

  <div class="row mb-3">
    <div class="col">
      <div class="form-group mb-3">
        <label for="trade_date" class="form-label">Trade date</label>
        <input type="text" class="form-control  datepick add_field required" id="trade_date" placeholder="dd/mm/yyyy" value="" autocomplete="off">
      </div>
    </div>

    <div class="col">
      <div class="form-group mb-3">
        <label for="trade_payment_date" class="form-label">Payment date</label>
        <input type="text" class="form-control datepick add_field required" id="trade_payment_date" placeholder="dd/mm/yyyy"  value="" autocomplete="off">
      </div>
    </div>


    <div class="col">
      <div class="form-group mb-3">
        <label for="final_date" class="form-label">Final Date</label>
        <input type="text" class="form-control datepick add_field required" id="final_date" placeholder="dd/mm/yyyy"  value="" autocomplete="off">
      </div>
    </div>

    <div class="col">
      <div class="form-group mb-3">
        <label for="final_payment_date" class="form-label">Payment date</label>
        <input type="text" class="form-control datepick add_field required" id="final_payment_date" placeholder="dd/mm/yyyy"  value="" autocomplete="off">
      </div>
    </div>
  </div>

<hr />


  <!-- modal-lg -->
<button type="button"  id='check_details' class="btn btn-outline-theme me-2" data-bs-toggle="modal" data-bs-target="#modalLg"><i class="fas fa-search"></i>  Check details</button>




<hr />

</template>

<!-- ////////////////////////////////////////////////////////////////////////////////////////////////////// -->


<template name="summary_reverse_convertible">
<div  class= "container">
  <button class="btn btn-outline-theme pull-right mb-3 mt-3" id='insert_product'><i class="fas fa-plus"></i>  Add product</button>

<div  class= "row">

<div  class= "col-1">

</div>
{{#with new_product}}

<div  class= "col">
        <dl class="row mt-3">
          <dt class="col-sm-3">ISIN</dt>
          <dd class="col-sm-9">{{isin_input}}</dd>
          <dt class="col-sm-3">Duration</dt>
          <dd class="col-sm-9">{{duration}} {{duration_unit}}</dd>
          <dt class="col-sm-3">Currency</dt>
          <dd class="col-sm-9">{{currency_input}}</dd>
          <dt class="col-sm-3">Issuer</dt>
          <dd class="col-sm-9">{{issuer}}</dd>
<br>
          <dt class="col-sm-3">Guaranteed coupon</dt>
          <dd class="col-sm-9">{{coupon}}</dd>
          <dt class="col-sm-3">Protection barrier</dt>
          <dd class="col-sm-9">{{protection_barrier}} {{barrier_type}}</dd>



          <dt class="col-sm-3">Dates</dt>
          <dd class="col-sm-9">
            <dl class="row">
              <dt class="col-sm-4">Launch date</dt>
              <dd class="col-sm-8">{{trade_date}}</dd>
            </dl>
            <dl class="row">
              <dt class="col-sm-4">Payment date</dt>
              <dd class="col-sm-8">{{trade_payment_date}}</dd>
            </dl>
            <dl class="row">
              <dt class="col-sm-4">Final observation date</dt>
              <dd class="col-sm-8">{{final_date}}</dd>
            </dl>
            <dl class="row">
              <dt class="col-sm-4">Payment date</dt>
              <dd class="col-sm-8">{{final_payment_date}}</dd>
            </dl>
          </dd>


          <dt class="col-sm-3">Prices</dt>
          <dd class="col-sm-9">
            <dl class="row">
              <dt class="col-sm-4">Re-Offer</dt>
              <dd class="col-sm-8">{{reoffer}}</dd>
            </dl>
            <dl class="row">
              <dt class="col-sm-4">Issue price</dt>
              <dd class="col-sm-8">{{issue_price}}</dd>
            </dl>
            <dl class="row">
              <dt class="col-sm-4">Brokerage fee</dt>
              <dd class="col-sm-8">{{brokerage_fee}}</dd>
            </dl>

          </dd>

          <dt class="col-sm-3">Underlying / Strikes</dt>
          <dd class="col-sm-9">

{{#each underlyings}}

            <dl class="row">
              <dt class="col-sm-4">{{ticker}}.{{exchange}}</dt>
              <dd class="col-sm-8">{{strike}}</dd>
            </dl>

{{/each}}

          </dd>

          <dl class="row">
            <dt class="col-sm-3">Other features</dt>
            <dd class="col-sm-9">

<p>{{#if features.geared_put}}<i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> Geared Put{{/if}}</p>
<p>{{#if features.one_star}}<i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> One Star{{/if}}</p>
<p>{{#if features.best_strike}}<i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> Best Strike{{/if}}</p>
  </dd>
          </dl>


        </dl>

</div>

{{/with}}
</div>
</div>
</template>
