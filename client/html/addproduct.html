<template name="addproduct">
	<script src="plugins/bootstrap-datepicker/dist/js/bootstrap-datepicker.min.js"></script>
	<div class="d-flex align-items-center mb-3 shadow">
		<div>
			<ul class="breadcrumb">
				<li class="breadcrumb-item"><a href="#">AMBERVISION</a></li>
				<li class="breadcrumb-item active">Add product to database</li>
			</ul>
			<h1 class="page-header mb-0 reveal">Add product<span class="animate__animated animate__flash animate__infinite">_</span></h1>
		</div>


	</div>
	<button class="btn btn-outline-theme pull-right mb-3" id='next_ticker'><i class="fas fa-plus"></i>  Add product</button>
	<!-- basic usage -->
	<div class="card">
		<div class="card-header fw-bold small">Characteristics</div>
		<div class="card-body">

			<ul class="nav nav-tabs">
				<li class="nav-item me-1"><a href="#main" class="nav-link active" data-bs-toggle="tab">Main</a></li>
				<li class="nav-item me-1"><a href="#features" class="nav-link" data-bs-toggle="tab">Features</a></li>
				<li class="nav-item me-1"><a href="#underlyings" class="nav-link" data-bs-toggle="tab">Underlyings</a></li>
				<li class="nav-item me-1"><a href="#dates" class="nav-link" data-bs-toggle="tab">Dates</a></li>

			</ul>
			<div class="tab-content pt-3">
				<!-- Tab Main  -->

				<div class="tab-pane fade show active" id="main">

					<div class="container">

						<div class="row mb-3">
							<div class="col">
								<div class="form-group mb-3">
									<label for="isin_input" class="form-label">ISIN</label>
									<input type="text" class="form-control" id="isin_input" value="XS123456789">
								</div>
							</div>

							<div class="col">
								<div class="form-group mb-3">
									<label for="reoffer" class="form-label">Re-offer</label>
									<input type="text" class="form-control" id="reoffer" value="100%">
								</div>
							</div>


							<div class="col">
								<div class="form-group mb-3">
									<label for="issue_price" class="form-label">Issue price</label>
									<input type="text" class="form-control" id="issue_price" value="100%">
								</div>
							</div>

							<div class="col">
								<div class="form-group mb-3">
									<label for="brokerage_fee" class="form-label">Broker fee</label>
									<input type="text" class="form-control" id="brokerage_fee" value="0%">
								</div>
							</div>


						</div>

						<div class="row mb-3">
							<div class="col">

								<label for="producttype" class="form-label">Product type</label>
								<select class="form-control" id="producttype">
									<option selected>Please select</option>
									<option value="1">Reverse Convertible</option>
									<option value="2">Phoenix</option>
								</select>

							</div>

							<div class="col">

								<label class="form-label">Duration</label>
								<div class="input-group mb-3">
									<input type="text" class="form-control" placeholder="Duration" aria-label="Duration" aria-describedby="basic-addon2">
									<div class="input-group-append">

										<select class="form-select" id="productType" aria-label="Default select example">
											<option selected>Unit</option>
											<option value="1">Months</option>
											<option value="2">Years</option>

										</select>


									</div>
								</div>

							</div>
							<div class="col">

								<label for="producttype" class="form-label">Issuer</label>
								<select class="form-control" id="producttype">
									<option selected>Please select</option>
									<option value="1">BNP Paribas</option>
									<option value="2">Exane</option>
									<option value="2">Société Générale</option>

								</select>


							</div>
							<div class="col">
								<label for="currency_input" class="form-label">Currency</label>

								<select id="currency_input" class="js-example-basic-single form-control">
									<option value="EUR">EUR</option>
									<option value="USD">USD</option>
									<option value="GBP">GBP</option>

								</select>
							</div>
						</div>

						<div class="row mb-3">

						</div>
					</div>

				</div>
				<div class="tab-pane fade" id="underlyings">
					<div class="container">

						<table class="table">
							<button class="btn btn-outline-theme pull-right mb-2" id='next_ticker'><i class="fas fa-plus"></i> Add ticker</button>
							<tbody class="underlyings_input">
								<tr id="underlying_line_1" class="">
									<th scope="row"><label for="underlying_1" class="mb-2">Ticker</label>
										<div class="input-group">
											<input type="text" class="form-control underlyings underlyings_change" id="underlying_1" placeholder="Ticker" aria-label="Ticker" aria-describedby="basic-addon2">
											<div class="input-group-append">
												<select class="form-select underlyings_change" id="country_1" aria-label="Default select example">
													<option selected>US</option>
													<option value="1">FR</option>
													<option value="2">DE</option>
												</select>
											</div>
										</div>
									</th>
									<td><label for="close_1" class="mb-2">Close ()</label><input type="text" class="form-control cash" id="close_1" value="" disabled></td>
									<td><label for="strike_1" class="mb-2">Strike</label><input type="text" class="form-control cash" id="strike_1" value=""></td>


									<td></td>
								</tr>

							</tbody>
						</table>

					</div>





				</div>

				<div class="tab-pane fade" id="features">

					<div class="container">

						<div class="row mb-3">
							<div class="col">
								<div class="form-group mb-3">
									<label for="coupon" class="form-label">Coupon</label>
									<input type="text" class="form-control" id="coupon" value="5.00%">
								</div>
							</div>

							<div class="col">
								<div class="form-group mb-3">
									<label for="reoffer" class="form-label">Periodicity</label>
									<select id="frequency_input" class="form-control">
										<option value="" selected="selected">Please Choose</option>
										<option value="d">Daily</option>
										<option value="W">Weekly</option>
										<option value="M">Monthly</option>
										<option value="Q">Quarterly</option>
										<option value="SA">Semi-annually</option>
										<option value="Y">Annually</option>
										<option value="at_maturity">Maturity</option>
									</select>
								</div>
							</div>


							<div class="col">
								<div class="form-group mb-3">
									<label for="coupon_barrier" class="form-label">Coupon barrier</label>
									<input type="text" class="form-control" id="coupon_barrier" value="60%">
								</div>
							</div>

							<div class="col">
								<div class="form-group mb-3">
									<label for="protection_barrier" class="form-label">Protection barrier</label>
									<input type="text" class="form-control" id="protection_barrier" value="60%">
								</div>
							</div>


						</div>

						<div class="row mb-3">
							<div class="col">

								<label for="producttype" class="form-label">Product type</label>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">Memory Coupon</label>

								</div>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">Memory Autocall</label>
								</div>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">Geared Put</label>
								</div>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">One Star</label>
								</div>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">Step-down</label>
								</div>
								<div class="form-check form-switch">
									<input type="checkbox" class="form-check-input" id="customSwitch1">
									<label class="form-check-label" for="customSwitch1">Max effect</label>
								</div>



							</div>

							<div class="col">

							</div>
							<div class="col">

							</div>
							<div class="col">
							</div>
						</div>

						<div class="row mb-3">

						</div>

					</div>
				</div>




				<div class="tab-pane fade" id="dates">
					<div class="container">

						<div class="container">

							<div class="row mb-3">
								<div class="col">
									<div class="form-group mb-3">
										<label for="reoffer" class="form-label">Launch date</label>
										<input type="text" class="form-control datepick" id="launchdate" placeholder="dd/mm/yyyy" />
									</div>
								</div>

								<div class="col">
									<label for="reoffer" class="form-label">Payment lag</label>
									<div class="input-group flex-nowrap mb-3">
										<span class="input-group-text" id="addon-wrapping">t+</span>
										<input type="text" class="form-control" value="7" placeholder="" />
									</div>
								</div>



							</div>



							<div class="row mb-3">
								<button class="btn btn-outline-theme pull-right mb-2" id='next_ticker'><i class="fas fa-calendar-check"></i> Generate schedule</button>
							</div>

 <hr/>

							<div class="row mb-3">
								<div class="col">
									<div class="form-group mb-3">
										<label for="isin_input" class="form-label">Trade date</label>
										<input type="text" class="form-control" id="isin_input" value="XS123456789">
									</div>
								</div>

								<div class="col">
									<div class="form-group mb-3">
										<label for="reoffer" class="form-label">Payment date</label>
										<input type="text" class="form-control" id="reoffer" value="100%">
									</div>
								</div>


								<div class="col">
									<div class="form-group mb-3">
										<label for="issue_price" class="form-label">Final Date</label>
										<input type="text" class="form-control" id="issue_price" value="100%">
									</div>
								</div>

								<div class="col">
									<div class="form-group mb-3">
										<label for="brokerage_fee" class="form-label">Payment date</label>
										<input type="text" class="form-control" id="brokerage_fee" value="0%">
									</div>
								</div>

								<div class="col">
									<div class="form-group mb-3">
										<label for="brokerage_fee" class="form-label">1st call date</label>
										<input type="text" class="form-control" id="brokerage_fee" value="0%">
									</div>
								</div>

							</div>

  <hr/>

	<!-- default table -->
<table class="table table-striped">
  <thead>
		<tr>
			<th style="width: 10%">Obs</th>
			<th style="width: 25%">Date</th>
			<th style="width: 25%">Payment</th>
			<th style="width: 10%" class="text-center">Autocall</th>
			{{#if features.memory_autocall}}
				<th style="width: 10%">Memory Lock</th>
			{{/if}}
			<th style="width: 10%">Autocall Level</th>
			<th style="width: 10%">Coupon barrier</th>
		</tr>
  </thead>
  <tbody>


		{{>schedule}}
		{{>schedule}}



  </tbody>
</table>



						</div>


					</div>
				</div>

			</div>


		</div>

		<!-- arrow -->
		<div class="card-arrow">
			<div class="card-arrow-top-left"></div>
			<div class="card-arrow-top-right"></div>
			<div class="card-arrow-bottom-left"></div>
			<div class="card-arrow-bottom-right"></div>
		</div>
	</div>

</template>

<template name="schedule">

	<tr>
		<td scope="row"><input type="text" class="unique_obs form-control" value={{label}} name={{label}}></td>
		<td>

			<input type="date" class="date_output form-control date js-date datepick" name={{label}} value="{{this.date}}" />
		</td>
		<td>
			<input type="date" class="form-control date js-date pmt_date_output datepick" name={{label}} value="{{this.pmt_date}}" />

		</td>
		<td class="text-center">

			<!-- <input type="checkbox" class="callable_date_output form-check-input form-control" checked={{this.autocall}} name={{label}}> -->

			<input class="form-check-input" type="checkbox" value="" id="defaultCheck1" />

</td>

		{{#if features.memory_autocall}}
			<td class="text-center"><input type="checkbox" class="memorylock_output form-control" checked={{this.memorylock}} name={{label}}></td>

		{{/if}}

		<td><input type="text" class="autocall_level_output form-control" id='autocall_level_{{label}}' name={{label}} value="{{this.call_level}}"></td>

		{{#if this.autocall}}
			<script>  </script>
		{{/if}}


			<td><input type="text" class="protection_barrier_output form-control" id='bonus_level_{{label}}' name={{label}} value="{{this.bonus_barrier}}"></td>
			<script>

			</script>


	</tr>

	</template>
