<template name="addproduct">
	<script src="plugins/bootstrap-datepicker/dist/js/bootstrap-datepicker.min.js"></script>
	<div class="d-flex align-items-center mb-3 shadow">
		<div>
			<ul class="breadcrumb">
				<li class="breadcrumb-item"><a href="#">AMBERVISION</a></li>
				<li class="breadcrumb-item active">Add product to database</li>
			</ul>
			<h1 class="page-header mb-0 reveal">Add product > {{product_type}}<span class="animate__animated animate__flash animate__infinite">_</span></h1>
		</div>


	</div>
	<button class="btn btn-outline-theme pull-right mb-3" id='next_ticker'><i class="fas fa-plus"></i>  Add product</button>
	<!-- basic usage -->
	<div class="card">
		<div class="card-header fw-bold small">Characteristics</div>
		<div class="card-body">

			<ul class="nav nav-tabs">

				<li class="nav-item me-1"><a href="#main" class="nav-link active" data-bs-toggle="tab">Main</a></li>
				<li class="nav-item me-1"><a href="#underlyings" class="nav-link" data-bs-toggle="tab">Underlyings</a></li>
				<li class="nav-item me-1"><a href="#features" class="nav-link" data-bs-toggle="tab">Features</a></li>
				<li class="nav-item me-1"><a href="#dates" class="nav-link" data-bs-toggle="tab">Dates</a></li>
								<li class="nav-item me-1"><a href="#summary" class="nav-link" data-bs-toggle="tab">Summary </a></li>

			</ul>
			<div class="tab-content pt-3">
				<!-- Tab Main  -->

				<div class="tab-pane fade show active" id="main">
					<div class="container">

							{{>common}}

					</div>

				</div>

				<div class="tab-pane fade" id="underlyings">
					<div class="container">

							{{>underlyings}}

					</div>

				</div>

				<div class="tab-pane fade" id="features">

					<div class="container">

{{#if is product_type "Reverse Convertible"}}   {{>features_reverse_convertible}}  {{/if}}


					</div>
				</div>




				<div class="tab-pane fade" id="dates">
					<div class="container">

{{#if is product_type "Reverse Convertible"}}   {{>dates_reverse_convertible}}  {{/if}}


					</div>
				</div>

				<div class="tab-pane fade" id="summary">
					<div class="container">

You are going to add the following Reverse Convertible in the database.

					</div>
				</div>

			</div>


		</div>

		<!-- arrow -->
		<div class="card-arrow">
			<div class="card-arrow-top-left"></div>
			<div class="card-arrow-top-right"></div>
			<div class="card-arrow-bottom-left"></div>
			<div class="card-arrow-bottom-right"></div>
		</div>
	</div>

</template>

<template name="schedule">

	<tr>
		<td scope="row"><input type="text" class="unique_obs form-control" value={{label}} name={{label}}></td>
		<td>

			<input type="date" class="date_output form-control date js-date datepick" name={{label}} value="{{this.date}}" />
		</td>
		<td>
			<input type="date" class="form-control date js-date pmt_date_output datepick" name={{label}} value="{{this.pmt_date}}" />

		</td>
		<td class="text-center">

			<!-- <input type="checkbox" class="callable_date_output form-check-input form-control" checked={{this.autocall}} name={{label}}> -->

			<input class="form-check-input" type="checkbox" value="" id="defaultCheck1" />

</td>

		{{#if features.memory_autocall}}
			<td class="text-center"><input type="checkbox" class="memorylock_output form-control" checked={{this.memorylock}} name={{label}}></td>

		{{/if}}

		<td><input type="text" class="autocall_level_output form-control" id='autocall_level_{{label}}' name={{label}} value="{{this.call_level}}"></td>

		{{#if this.autocall}}
			<script>  </script>
		{{/if}}


			<td><input type="text" class="protection_barrier_output form-control" id='bonus_level_{{label}}' name={{label}} value="{{this.bonus_barrier}}"></td>
			<script>

			</script>


	</tr>


	</template>
