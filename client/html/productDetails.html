<template name="productDetails">
  <div id="content" class="app-content">




    <div class="d-flex align-items-center mb-3">
      <div>
        <ul class="breadcrumb">
          <li class="breadcrumb-item"><a href="#">AMBERVISION</a></li>
          <li class="breadcrumb-item active">Product details</li>
        </ul>
        <h1 class="page-header mb-0 reveal">{{productDetails.genericInformation.ISINCode}}<span class="animate__animated animate__flash animate__infinite">_</span></h1>
      </div>


    </div>

    <div class="row">

      <div class="col-xl-3">

        <div class="desktop-sticky-top d-none d-lg-block">
        <div class="card shadow">


          <div class="card-header fw-bold medium lead">{{productDetails.genericInformation.name}}</div>

          <button class="btn btn-outline-theme mb-2" id="editProduct" data-isin="{{productDetails.genericInformation.ISINCode}}"><i class="fas fa-plus"></i> Edit product</button>


          <div class="card-body">
            <h5 class="card-title">
              <div class="spinner-grow spinner-grow-sm text-warning"></div> Live Product
            </h5>
            <h6 class="card-subtitle mb-3 text-white text-opacity-50 animate__animated animate__pulse">Bid price: 101,50%</h6>

            <div class="row">
              <div class="col-12 col-sm-6 col-xl-12">

                <ul class="list-group list-group-horizontal mt-3">
                  <li class="list-group-item flex-fill">Currency</li>
                  <li class="list-group-item pull-right">{{productDetails.genericInformation.currency}}</li>
                </ul>

                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Nominal</li>
                  <li class="list-group-item  pull-right">{{productDetails.genericInformation.nominal}}</li>
                </ul>
                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Coupon</li>
                  <li class="list-group-item  pull-right">{{productDetails.specificInfo.couponAmount}}</li>
                </ul>
                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Protection barrier</li>
                  <li class="list-group-item  pull-right">60%</li>
                </ul>

                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Coupon barrier</li>
                  <li class="list-group-item  pull-right">60%</li>
                </ul>
                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Issuer</li>
                  <li class="list-group-item  pull-right">{{productDetails.genericInformation.issuer}}</li>
                </ul>

                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Issue date</li>
                  <li class="list-group-item  pull-right">{{formatDate productDetails.genericInformation.tradeDate}}</li>
                </ul>

                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Maturity</li>
                  <li class="list-group-item  pull-right">{{formatDate productDetails.genericInformation.maturity}}</li>
                </ul>
                <ul class="list-group list-group-horizontal">
                  <li class="list-group-item flex-fill">Settlement</li>
                  <li class="list-group-item  pull-right">{{productDetails.genericInformation.settlementType}}</li>
                </ul>
              </div>


              <div class="col-12 col-sm-6 col-xl-12">
                <p class="card-text mb-3">

                  <!-- BEGIN card -->
                  <div class="card mb-3">
                    <!-- BEGIN card-header -->
                    <div class="card-header d-flex align-items-center bg-white bg-opacity-15">
                      <span class="flex-grow-1 fw-400">Features</span>

                    </div>
                    <!-- END card-header -->


                    <ul class="list-group">
                      <li class="list-group-item">

                        <i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> Geared Put</li>
                      <li class="list-group-item">
                        <i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> Memory Coupons</li>
                      <li class="list-group-item">
                        <i class="far fa-check-circle text-warning fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> Memory Locks</li>
                      <li class="list-group-item">
                        <i class="far fa-check-circle text-dark fa-fw fa-lg animate__animated animate__delay-1s animate__bounceIn "></i> One Star</li>

                    </ul>



                    <!-- BEGIN card-arrow -->
                    <div class="card-arrow">
                      <div class="card-arrow-top-left"></div>
                      <div class="card-arrow-top-right"></div>
                      <div class="card-arrow-bottom-left"></div>
                      <div class="card-arrow-bottom-right"></div>
                    </div>
                    <!-- END card-arrow -->
                  </div>
                  <!-- END card -->

                </p>

              </div>
            </div>
          </div>

          <!-- arrow -->
          <div class="card-arrow">
            <div class="card-arrow-top-left"></div>
            <div class="card-arrow-top-right"></div>
            <div class="card-arrow-bottom-left"></div>
            <div class="card-arrow-bottom-right"></div>
          </div>
        </div>
      </div>
  </div>

      <div class="col-xl-9">
        <!-- basic usage -->

            <!-- BEGIN card -->
            <div class="card mb-3">
              <!-- BEGIN card-body -->
              <div class="card-body">
                <!-- BEGIN title -->
                <div class="d-flex fw-bold small mb-3">
                  <span class="flex-grow-1">UNDERLYINGS</span>
                  <a href="#" data-toggle="card-expand" class="text-white text-opacity-50 text-decoration-none"><i class="bi bi-fullscreen"></i></a>
                </div>
                <!-- END title -->
                <div class="table-responsive">
                  <table class="w-100 mb-0 small align-middle text-nowrap mytable">
                    <tbody>
                      {{#each underlying in productDetails.underlyingsArray}}
                      <tr>
                        <td>
                          <div class="d-flex">
                            <div class="position-relative mb-2">
                              <!-- Update the style attribute to include the background image URL dynamically constructed -->
                              <div class="position-relative mb-2 logo-container">
                                <img src="https://eodhd.com/img/logos/{{underlying.country}}/{{underlying.ticker}}.png" alt="{{underlying.ticker}} logo" class="rounded-circle">
                              </div>


                            </div>
                            <div class="flex-1 ps-3">
                              <div class="mb-1">
                                <small class="fs-9px fw-500 lh-1 d-inline-block rounded-0 badge bg-white bg-opacity-25 text-white text-opacity-75 pt-5px">
                                  {{underlying.ticker}}.{{underlying.country}}
                                </small>
                              </div>
                              <div class="fw-500 text-white">{{underlying.fullName}}</div>
                              <!-- Assuming underlying.currentPrice is available and correctly populated -->
                              {{underlying.currency}} {{underlying.currentPrice}}
                            </div>
                          </div>
                        </td>
                        <td>
                          <table class="mb-2">
                            <tr>
                              <td class="pe-3">Strike:</td>
                              <td class="text-white text-opacity-75 fw-500">{{underlying.currency}} {{underlying.strike}}</td>
                            </tr>
                            <tr>
                              <td class="pe-3">Performance:</td>
                              <!-- Assuming underlying.performanceSinceLaunch is available and correctly populated -->
                              <td class="text-white text-opacity-75 fw-500">{{underlying.performanceSinceLaunch}}</td>
                            </tr>
                            <tr>
                              <td class="pe-3 text-nowrap">Distance to barrier:</td>
                              <!-- Assuming underlying.distanceToBarrier is available and correctly populated -->
                              <td class="text-white text-opacity-75 fw-500">{{underlying.distanceToBarrier}}</td>
                            </tr>
                          </table>
                        </td>
                        <td><a href="#" class="text-decoration-none text-dark"><i class="bi bi-lock"></i></a></td>
                      </tr>
                      {{/each}}

                    </tbody>
                  </table>
                </div>

                <!-- END table -->
              </div>
              <!-- END card-body -->

              <!-- BEGIN card-arrow -->
              <div class="card-arrow">
                <div class="card-arrow-top-left"></div>
                <div class="card-arrow-top-right"></div>
                <div class="card-arrow-bottom-left"></div>
                <div class="card-arrow-bottom-right"></div>
              </div>
              <!-- END card-arrow -->
            </div>
            <!-- END card -->
            <!-- basic usage -->
            <div class="card">


              <div class="card-header d-flex justify-content-center align-items-center">

                <div class="nav-wizards-container">
                  <nav class="nav nav-wizards-3 mb-2">
                    <div class="nav-item col">
                      <a class="nav-link completed" href="#">
                        <div class="nav-dot"></div>
                        <div class="nav-title">Launch</div>
                        <div class="nav-text">21/02/2021</div>
                      </a>
                    </div>
                    <div class="nav-item col">
                      <a class="nav-link completed" href="#">
                        <div class="nav-dot"></div>
                        <div class="nav-title">Issue date</div>
                        <div class="nav-text">28/02/2021</div>
                      </a>
                    </div>
                    <div class="nav-item col">
                      <a class="nav-link active" href="#">
                        <div class="nav-dot"></div>
                        <div class="nav-title">1st call</div>
                        <div class="nav-text">21/08/2021</div>
                      </a>
                    </div>
                    <div class="nav-item col">
                      <a class="nav-link disabled" href="#">
                        <div class="nav-dot"></div>
                        <div class="nav-title">Final</div>
                        <div class="nav-text">21/05/2023</div>
                      </a>
                    </div>
                    <div class="nav-item col">
                      <a class="nav-link disabled" href="#">
                        <div class="nav-dot"></div>
                        <div class="nav-title">Maturity</div>
                        <div class="nav-text">28/05/2023</div>
                      </a>
                    </div>
                  </nav>
                </div>


              </div>

              <div class="card-body">
                <div class="d-flex fw-bold small mb-3">
                  <span class="flex-grow-1">OBSERVATIONS</span>
                  <a href="#" data-toggle="card-expand" class="text-white text-opacity-50 text-decoration-none">
                    <i class="bi bi-fullscreen"></i>
                  </a>
                </div>


                <!-- BEGIN #tableHeadOptions -->
                <div id="tableHeadOptions" class="mb-5">


                    <div class="card-body">
                      <div class="row mb-n3">
                        <div class="col-xl-12">

                          <table class="table">
                            <thead class="table-dark">
                              <tr>
                                <th scope="col">#</th>
                                <th scope="col">Date</th>
                                <th scope="col">Payment Date</th>
                                <th scope="col">Callable</th>
                                <th scope="col">Coupon paid</th>

                              </tr>
                            </thead>
                            <tbody>
                              {{#each observations}}
                                <tr>
                                  <th scope="row" class="">{{n}}</th>
                                  <td class="Warning">{{observationDate}}</td>
                                  <td class="">{{paymentDate}}</td>
                                  <td class="">{{#if isCallable}}Yes{{else}}No{{/if}}</td>
                                  <td class="">{{#if coupon.paidCoupon}}Yes{{else}}No{{/if}}</td>
                                </tr>
                              {{/each}}
                            </tbody>
                          </table>
                        </div>
                    </div>

                    <div class="hljs-container">
                      <pre><code class="xml" data-url="assets/data/table-elements/code-2.json"></code></pre>
                    </div>
                  </div>
                </div>
                <!-- END #tableHeadOptions -->

              </div>

              <!-- arrow -->
              <div class="card-arrow">
                <div class="card-arrow-top-left"></div>
                <div class="card-arrow-top-right"></div>
                <div class="card-arrow-bottom-left"></div>
                <div class="card-arrow-bottom-right"></div>
              </div>
            </div>



          </div>

          <!-- arrow -->
          <div class="card-arrow">
            <div class="card-arrow-top-left"></div>
            <div class="card-arrow-top-right"></div>
            <div class="card-arrow-bottom-left"></div>
            <div class="card-arrow-bottom-right"></div>
          </div>



    </div>


  </div>


  </template>
